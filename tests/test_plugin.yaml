---
- case: positional_only
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, /, b: str = "default") -> None: ...
    func(1)

- case: positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int) -> None: ...
    func(1)
  out: |
    main:2: error: Too many positional arguments for "func"  [misc]

- case: positional_optional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int = 1) -> None: ...
    func(1)
    func()
  out: |
    main:2: error: Too many positional arguments for "func"  [misc]

- case: keyword_only
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*, a: int) -> None: ...
    func(a=1)

- case: keyword_only_optional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*, a: int = 1) -> None: ...
    func(a=1)
    func()

- case: var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*args: str) -> None: ...
    func("extra")

- case: var_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(**kwargs: str) -> None: ...
    func(a="extra")

- case: positional_followed_by_var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, *args: str) -> None: ...
    func(1)

- case: positional_optional_followed_by_var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int = 1, *args: str) -> None: ...
    func(1)
    func()

- case: positional_followed_by_var_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, **kwargs: str) -> None: ...
    func(1)
  out: |
    main:2: error: Too many positional arguments for "func"  [misc]

- case: var_positional_followed_by_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*args: str, a: int) -> None: ...
    func("a", a=1)

- case: method
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class C:
        def __init__(self) -> None: ...

        def method(self, a: int) -> None: ...

    c = C()
    c.method(1)
  out: |-
    main:7: error: Too many positional arguments for "method" of "C"  [misc]

- case: callable_class_as_decorator
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    from typing import Any

    class C:
        def __call__(self, func: Any) -> None: ...

    @C()
    def func() -> None: ...

- case: callable_class_extra_params
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    from typing import Any

    class C:
        def __call__(self, func: Any, a: int) -> None: ...

    c = C()
    c(lambda: None, 1)
    c(func=lambda: None, a=1)
    c(lambda: None, a=1)
  out: |-
    main:7: error: Too many positional arguments for "__call__" of "C"  [misc]

- case: descriptor
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class D:
      def __get__(self, o: object, ot: type | None = None) -> None:
          return

      def __set__(self, o: object, v: int) -> None:
          return

    class C:
        a = D()

    c = C()
    c.a
    c.a = 1

# ``TypeVar``/``ParamSpec``/``TypeVarTuple``/``NewType`` are special forms
# that ``mypy`` does not route through a call-site signature hook.  A
# normally type checked call (``trigger``) is included so that the plugin
# has an opportunity to walk the module and report these.
- case: special_form_typevar
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _T = TypeVar("_T")
  out: |
    main:6: error: Too many positional arguments for "TypeVar"  [misc]

- case: special_form_paramspec
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import ParamSpec

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _P = ParamSpec("_P")
  out: |
    main:6: error: Too many positional arguments for "ParamSpec"  [misc]

- case: special_form_typevartuple
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypeVarTuple

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _Ts = TypeVarTuple("_Ts")
  out: |
    main:6: error: Too many positional arguments for "TypeVarTuple"  [misc]

- case: special_form_newtype
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import NewType

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    UserId = NewType("UserId", int)
  out: |
    main:6: error: Too many positional arguments for "NewType"  [misc]

- case: special_form_typevar_with_bound
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _T = TypeVar("_T", bound=int)
  out: |
    main:6: error: Too many positional arguments for "TypeVar"  [misc]

- case: special_form_in_class_body
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)

    class C:
        _T = TypeVar("_T")
  out: |
    main:8: error: Too many positional arguments for "TypeVar"  [misc]

- case: special_form_in_function
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)

    def f() -> None:
        _T = TypeVar("_T")
        del _T
  out: |
    main:8: error: Too many positional arguments for "TypeVar"  [misc]

- case: special_form_ignored
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs

    [mypy_strict_kwargs]
    ignore_names = typing.TypeVar
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _T = TypeVar("_T")

# A special form whose ``name`` is passed by keyword is not a
# strict-kwargs violation (``mypy`` rejects it separately).
- case: special_form_keyword_name_not_flagged
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import NewType

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    U = NewType(name="U", tp=int)
  out: |
    main:6: error: NewType(...) expects exactly two positional arguments  [misc]

# A non-special-form analyzed call (here ``TypedDict``) is walked but
# never matches, so nothing is reported.
- case: non_special_form_analyzed_call_not_flagged
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    from typing import TypedDict

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    D = TypedDict("D", {"a": int})

# We disable the cache for debug tests so that --mypy-same-process
# does not skip calling the signature hooks (which would miss the
# debug branch for coverage).
- case: special_form_debug
  disable_cache: true
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs

    [mypy_strict_kwargs]
    debug = true
  main: |
    from typing import TypeVar

    def trigger(*, x: int) -> None: ...

    trigger(x=1)
    _T = TypeVar("_T")
  out: |
    main:6: error: Too many positional arguments for "TypeVar"  [misc]

- case: ignore_name
  files:
    - path: pyproject.toml
      content: |
        [tool.mypy]
        plugins = ["mypy_strict_kwargs"]

        [tool.mypy_strict_kwargs]
        ignore_names = ["main.func", "builtins.str"]
  main: |-
    def func(a: int) -> None: ...
    func(1)

    def not_ignored(a: int) -> None: ...
    not_ignored(1)

    str(1)
  out: |-
    main:5: error: Too many positional arguments for "not_ignored"  [misc]

