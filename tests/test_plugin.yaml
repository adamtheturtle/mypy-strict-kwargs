- case: ignore_name
  files:
    - path: pyproject.toml
      content: |
        [tool.mypy]
        plugins = ["mypy_strict_kwargs"]

        [tool.mypy_strict_kwargs]
        ignore_names = ["main.func", "builtins.str"]
  main: |-
    def func(a: int) -> None: ...
    func(1)

    def not_ignored(a: int) -> None: ...
    not_ignored(1)

    str(1)
  out: |-
    main:5: error: Too many positional arguments for "not_ignored"  [call-arg]

# We disable the cache for debug tests so that --mypy-same-process
# does not skip calling the signature hooks (which would miss the
# debug branch for coverage).
- case: debug
  disable_cache: true
  files:
    - path: pyproject.toml
      content: |
        [tool.mypy]
        plugins = ["mypy_strict_kwargs"]

        [tool.mypy_strict_kwargs]
        ignore_names = ["main.func", "builtins.str"]
        debug = true
  main: |-
    def func(a: int) -> None: ...
    func(1)

    def not_ignored(a: int) -> None: ...
    not_ignored(1)

    str(1)
  out: |-
    main:5: error: Too many positional arguments for "not_ignored"  [call-arg]

