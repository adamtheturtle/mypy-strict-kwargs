---
- case: positional_only
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, /, b: str = "default") -> None: ...
    func(1)

- case: positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int) -> None: ...
    func(1)
  out: |
    main:2: error: Too many positional arguments for "func"  [call-arg]

- case: positional_optional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int = 1) -> None: ...
    func(1)
    func()
  out: |
    main:2: error: Too many positional arguments for "func"  [call-arg]

- case: keyword_only
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*, a: int) -> None: ...
    func(a=1)

- case: keyword_only_optional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*, a: int = 1) -> None: ...
    func(a=1)
    func()

- case: var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*args: str) -> None: ...
    func("extra")

- case: var_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(**kwargs: str) -> None: ...
    func(a="extra")

- case: positional_followed_by_var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, *args: str) -> None: ...
    func(1)

- case: positional_optional_followed_by_var_positional
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int = 1, *args: str) -> None: ...
    func(1)
    func()

- case: positional_followed_by_var_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(a: int, **kwargs: str) -> None: ...
    func(1)
  out: |
    main:2: error: Too many positional arguments for "func"  [call-arg]

- case: var_positional_followed_by_keyword
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |
    def func(*args: str, a: int) -> None: ...
    func("a", a=1)

- case: method
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class C:
        def __init__(self) -> None: ...

        def method(self, a: int) -> None: ...

    c = C()
    c.method(1)
  out: |-
    main:7: error: Too many positional arguments for "method" of "C"  [call-arg]

- case: super_method
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            super().method(1)
  out: |-
    main:6: error: Too many positional arguments for "method" of "B"  [call-arg]

- case: super_method_ignore_name
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs

    [mypy_strict_kwargs]
    ignore_names = main.B.method
  main: |-
    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            super().method(1)

- case: super_method_overload
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  files:
    - path: package/__init__.py
    - path: package/base.pyi
      content: |
        from typing import overload

        class B:
            @overload
            def method(self, a: int) -> int: ...
            @overload
            def method(self, a: str) -> str: ...
  main: |-
    from package.base import B

    class C(B):
        def call(self) -> int:
            return super().method(1)
  out: |-
    main:5: error: Too many positional arguments for "method" of "B"  [call-arg]

- case: super_method_explicit_super
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            super(C, self).method(1)
  out: |-
    main:6: error: Too many positional arguments for "method" of "B"  [call-arg]

- case: super_method_explicit_super_from_base
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class A:
        def method(self, value: int, /) -> None: ...

    class B(A):
        def method(self, value: int) -> None: ...

    class C(B):
        def call(self) -> None:
            super(B, self).method(1)

# Fall back to zero-argument super() MRO when the first argument is not a
# simple name or attribute (e.g. an index expression).
- case: super_method_explicit_super_non_name
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            classes = (B,)
            super(classes[0], self).method(1)
  out: |-
    main:7: error: Too many positional arguments for "method" of "B"  [call-arg]
    main:7: error: "method" undefined in superclass  [misc]

# Fall back when the first argument name does not resolve to a type.
- case: super_method_explicit_super_non_type
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    x = 1

    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            super(x, self).method(1)
  out: |-
    main:8: error: Too many positional arguments for "method" of "B"  [call-arg]
    main:8: error: Argument 1 for "super" must be a type object; got a non-type instance  [arg-type]

# Fall back when the explicit type is not in the current class MRO.
- case: super_method_explicit_super_not_in_mro
  mypy_config: |
    [mypy]
    plugins = mypy_strict_kwargs
  main: |-
    class Unrelated:
        pass

    class B:
        def method(self, a: int) -> None: ...

    class C(B):
        def method(self, a: int) -> None:
            super(Unrelated, self).method(1)
  out: |-
    main:9: error: Too many positional arguments for "method" of "B"  [call-arg]
    main:9: error: Argument 2 for "super" not an instance of argument 1  [misc]

